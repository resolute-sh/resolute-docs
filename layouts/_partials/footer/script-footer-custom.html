{{ if .IsHome -}}
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  (function() {
    var theme = document.documentElement.getAttribute('data-bs-theme');
    if (theme === 'auto') {
      theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'default';
    } else if (theme === 'dark') {
      theme = 'dark';
    } else {
      theme = 'default';
    }
    mermaid.initialize({
      startOnLoad: true,
      theme: theme,
      themeVariables: {
        primaryColor: theme === 'dark' ? '#1e293b' : '#f0fdfa',
        primaryBorderColor: theme === 'dark' ? '#14b8a6' : '#0d9488',
        primaryTextColor: theme === 'dark' ? '#e2e8f0' : '#0f172a',
        lineColor: theme === 'dark' ? '#14b8a6' : '#0d9488',
        secondaryColor: theme === 'dark' ? '#27272a' : '#f4f4f5',
        tertiaryColor: theme === 'dark' ? '#18181b' : '#ffffff',
        fontSize: '14px'
      },
      flowchart: {
        curve: 'basis',
        padding: 16,
        htmlLabels: true,
        useMaxWidth: true
      }
    });
  })();
</script>
{{ end -}}
