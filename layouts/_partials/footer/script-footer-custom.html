{{ if .IsHome -}}
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  (function() {
    var theme = document.documentElement.getAttribute('data-bs-theme');
    if (theme === 'auto') {
      theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'default';
    } else if (theme === 'dark') {
      theme = 'dark';
    } else {
      theme = 'default';
    }
    mermaid.initialize({
      startOnLoad: true,
      theme: theme,
      themeVariables: {
        primaryColor: theme === 'dark' ? '#14141e' : '#eaeaf0',
        primaryBorderColor: theme === 'dark' ? '#6390f0' : '#4a72d0',
        primaryTextColor: theme === 'dark' ? '#e8e8f0' : '#08080c',
        lineColor: theme === 'dark' ? '#6390f0' : '#4a72d0',
        secondaryColor: theme === 'dark' ? '#0e0e14' : '#f4f4f8',
        tertiaryColor: theme === 'dark' ? '#08080c' : '#f4f4f8',
        fontSize: '14px'
      },
      flowchart: {
        curve: 'basis',
        padding: 16,
        htmlLabels: true,
        useMaxWidth: true
      }
    });
  })();
</script>
{{ end -}}
